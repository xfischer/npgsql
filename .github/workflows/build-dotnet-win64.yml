name: EDB .NET Windows64 Build

on:
  # push:
  #  branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
env:
  dotnet_sdk_version: '6.0.x'

jobs:
  build-dotnet-win64:

    runs-on: windows-2019

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET Core 6 and 3.1
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: |
          ${{ env.dotnet_sdk_version }}
          3.1.x
    - name: Driver Restore
      run: dotnet restore
      working-directory: npgsql-6\src\Npgsql
    - name: Driver Build
      run: dotnet build --no-restore
      working-directory: npgsql-6\src\Npgsql

    - name: OpenTelemetry Restore
      run: dotnet restore
      working-directory: npgsql-6\src\Npgsql.OpenTelemetry
    - name: OpenTelemetry Build
      run: dotnet build --no-restore
      working-directory: npgsql-6\src\Npgsql.OpenTelemetry
      
    - name: Plugin GeoJSON Restore
      run: dotnet restore
      working-directory: npgsql-6\src\Npgsql.GeoJSON
    - name: Plugin GeoJSON Build
      run: dotnet build --no-restore
      working-directory: npgsql-6\src\Npgsql.GeoJSON
      
    - name: Plugin Json.NET Restore
      run: dotnet restore
      working-directory: npgsql-6\src\Npgsql.Json.NET
    - name: Plugin Json.NET Build
      run: dotnet build --no-restore
      working-directory: npgsql-6\src\Npgsql.Json.NET
      
    - name: Plugin NetTopologySuite Restore
      run: dotnet restore
      working-directory: npgsql-6\src\Npgsql.NetTopologySuite
    - name: Plugin NetTopologySuite Build
      run: dotnet build --no-restore
      working-directory: npgsql-6\src\Npgsql.NetTopologySuite
      
    - name: Plugin NodaTime Restore
      run: dotnet restore
      working-directory: npgsql-6\src\Npgsql.NodaTime
    - name: Plugin NodaTime Build
      run: dotnet build --no-restore
      working-directory: npgsql-6\src\Npgsql.NodaTime
      
