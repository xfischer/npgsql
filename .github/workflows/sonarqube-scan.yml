###
# Foundation-security SonarQube workflow
# version: dotnet-sonarqube - v2
###
name: Foundation-Security/SonarQube .net Scan

on:
  push:
    tags:
      - "**"
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to scan"
        required: true
        default: "master"
      run_coverage:
        type: boolean
        description: "Run coverage"
        required: true
        default: false

jobs:
  SonarQube-Scan:
    name: SonarQube Scan Job
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      id-token: write
      contents: read
    runs-on: windows-latest

    steps:
      - name: Create GitHub App token
        uses: EnterpriseDB/upm-github-actions/create-gh-app-token@main
        with:
          GH_APP_ID: ${{ secrets.FOUNDATION_SECURITY_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.FOUNDATION_SECURITY_APP_PRIVATE_KEY }}

      - name: Checkout source repository for dispatch runs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.ref }}
          path: source
          token: ${{ env.GH_APP_TOKEN }}

      - name: Checkout source repository for non-dispatch runs
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
          path: source
          token: ${{ env.GH_APP_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17.0.10
          distribution: "microsoft"

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Path .\.sonar\scanner -ItemType Directory -Force | Out-Null
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Checkout foundation repository
        uses: actions/checkout@v4
        with:
          repository: EnterpriseDB/foundation-packaging
          ref: v4
          token: ${{ env.GH_APP_TOKEN }}
          path: foundation

      - name: Checkout foundation-security repository
        id: checkout-foundation-security
        uses: actions/checkout@v4
        with:
          repository: EnterpriseDB/foundation-security
          ref: stable
          lfs: true
          path: foundation-security
          token: ${{ env.GH_APP_TOKEN }}

      # ----------------------------
      # Coverage-mode prerequisites
      # ----------------------------
      - name: Get EPAS Server
        if: (github.event_name == 'workflow_dispatch' && inputs.run_coverage) || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        uses: ./foundation/actions/windows/install/edbas
        with:
          edbas-version: 18
          additional-options: --superpassword edb

      - name: Add KeyPair
        if: (github.event_name == 'workflow_dispatch' && inputs.run_coverage) || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        shell: bash
        run: |
          cp server.crt "/c/Program Files/edb/as18/data/server.crt"
          cp server.key "/c/Program Files/edb/as18/data/server.key"
        working-directory: source/edb_test_db_scripts

      - name: Configure EPAS Server
        if: (github.event_name == 'workflow_dispatch' && inputs.run_coverage) || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        shell: bash
        run: |
          export PATH=$PATH:"/c/Program Files/edb/as18/bin"
          export EPAS="/c/Program Files/edb/as18"
          cd "$EPAS"
          SOCKET_DIR=$(echo "$LOCALAPPDATA\Temp" | sed 's|\\|/|g')
          sed -i "s|max_connections = 100|max_connections = 500|" "$EPAS/data/postgresql.conf"
          sed -i "s|#unix_socket_directories = ''|unix_socket_directories = '$SOCKET_DIR'|" "$EPAS/data/postgresql.conf"
          sed -i "s|#wal_level =|wal_level = logical #|" "$EPAS/data/postgresql.conf"
          sed -i "s|#max_wal_senders =|max_wal_senders = 50 #|" "$EPAS/data/postgresql.conf"
          sed -i "s|#logical_decoding_work_mem =|logical_decoding_work_mem = 64kB #|" "$EPAS/data/postgresql.conf"
          sed -i "s|#wal_sender_timeout =|wal_sender_timeout = 3s #|" "$EPAS/data/postgresql.conf"
          sed -i "s|#synchronous_standby_names =|synchronous_standby_names = 'npgsql_test_sync_standby' #|" "$EPAS/data/postgresql.conf"
          sed -i "s|#synchronous_commit =|synchronous_commit = local #|" "$EPAS/data/postgresql.conf"
          sed -i "s|#max_prepared_transactions = 0|max_prepared_transactions = 100|" "$EPAS/data/postgresql.conf"
          sed -i "s|#ssl = off|ssl = on|" "$EPAS/data/postgresql.conf"
          sed -i "s|#ssl_cert_file = 'server.crt'|ssl_cert_file = 'server.crt'|" "$EPAS/data/postgresql.conf"
          sed -i "s|#ssl_key_file = 'server.crt'|ssl_key_file = 'server.key'|" "$EPAS/data/postgresql.conf"
          cat "$EPAS/data/postgresql.conf"
          pg_ctl -D "$EPAS/data" restart

      - name: Create test database
        if: (github.event_name == 'workflow_dispatch' && inputs.run_coverage) || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        shell: cmd
        run: makedb.bat 5444
        working-directory: source/edb_test_db_scripts

      - name: Install PostGIS
        if: (github.event_name == 'workflow_dispatch' && inputs.run_coverage) || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        uses: ./foundation/actions/windows/install/postgis
        with:
          edbas-version: 18
          additional-options: --pgpassword edb --extract-only 1

      - name: Install DotNet Coverage tool
        if: (github.event_name == 'workflow_dispatch' && inputs.run_coverage) || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          dotnet tool install --global dotnet-coverage

      # ----------------------------
      # Branch/Dispatch analysis
      # ----------------------------
      - name: SonarQube analyze (branch/dispatch)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        shell: powershell
        working-directory: source
        run: |
          $ErrorActionPreference = "Stop"

          $branchName = "${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}"
          $runCoverage = "${{ (github.event_name == 'workflow_dispatch' && inputs.run_coverage) || (github.event_name == 'push' && github.ref == 'refs/heads/master') }}"

          if ($runCoverage -eq "true") {
            echo "Running coverage (branch/dispatch)"

            ..\.sonar\scanner\dotnet-sonarscanner begin `
              /k:"EnterpriseDB_edb-dotnet" /n:"edb-dotnet" /v:"${{ github.ref_name }}" `
              /d:sonar.branch.name="$branchName" `
              /d:sonar.token="${{ secrets.SONARQUBE_TOKEN }}" /d:sonar.host.url="${{ vars.SQ_URL }}" /d:sonar.verbose=true `
              /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml

            if ($LASTEXITCODE -ne 0) { throw "Sonar begin failed ($LASTEXITCODE)" }
            if (!(Test-Path .sonarqube)) { throw ".sonarqube missing after begin (wrong working directory or begin failed)" }

            dotnet build npgsql/ef.core/efcore.pg.sln --no-incremental -f net8.0
            dotnet-coverage collect "dotnet test npgsql/ef.core/efcore.pg.sln -c Release -f net8.0" -f xml -o "coverage.xml"

            ..\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONARQUBE_TOKEN }}"
          }
          else {
            echo "Not running coverage (branch/dispatch)"

            ..\.sonar\scanner\dotnet-sonarscanner begin `
              /k:"EnterpriseDB_edb-dotnet" /n:"edb-dotnet" /v:"${{ github.ref_name }}" `
              /d:sonar.branch.name="$branchName" `
              /d:sonar.token="${{ secrets.SONARQUBE_TOKEN }}" /d:sonar.host.url="${{ vars.SQ_URL }}" /d:sonar.verbose=true

            if ($LASTEXITCODE -ne 0) { throw "Sonar begin failed ($LASTEXITCODE)" }
            if (!(Test-Path .sonarqube)) { throw ".sonarqube missing after begin (wrong working directory or begin failed)" }

            dotnet build npgsql/ef.core/efcore.pg.sln --no-incremental
            ..\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONARQUBE_TOKEN }}"
          }

      # ----------------------------
      # Pull request analysis
      # ----------------------------
      - name: SonarQube analyze (pull_request)
        if: github.event_name == 'pull_request'
        shell: powershell
        working-directory: source
        run: |
          $ErrorActionPreference = "Stop"
          echo "PR scan"

          ..\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"EnterpriseDB_edb-dotnet" /n:"edb-dotnet" /v:"${{ github.ref_name }}" `
            /d:sonar.token="${{ secrets.SONARQUBE_TOKEN }}" /d:sonar.host.url="${{ vars.SQ_URL }}" /d:sonar.verbose=true `
            /d:sonar.pullrequest.key="${{ github.event.pull_request.number }}" `
            /d:sonar.pullrequest.branch="${{ github.head_ref }}" `
            /d:sonar.pullrequest.base="${{ github.base_ref }}"

          if ($LASTEXITCODE -ne 0) { throw "Sonar begin failed ($LASTEXITCODE)" }
          if (!(Test-Path .sonarqube)) { throw ".sonarqube missing after begin (wrong working directory or begin failed)" }

          dotnet build npgsql/ef.core/efcore.pg.sln --no-incremental
          ..\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONARQUBE_TOKEN }}"
